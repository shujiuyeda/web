<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <link rel="manifest" href="dashboard-manifest.json">
  <link rel="apple-touch-icon" href="icons/dashboard-512.png">
  <title>しゅうしゅう Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #2d3748;
      --text-muted: #718096;
      --shadow: 0 2px 12px rgba(100,120,200,0.1);
      --shadow-hover: 0 4px 20px rgba(100,120,200,0.18);
      --radius: 16px;
      --grad-private: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      --grad-biz: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --grad-header: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f093fb 100%);
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --orange: #f59e0b;
      --pink: #ec4899;
      --red: #ef4444;
      --cyan: #06b6d4;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .header {
      background: var(--grad-header);
      padding: 24px 20px 20px;
      color: white;
      position: relative;
    }
    .header h1 {
      font-size: 22px; font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }
    .header .date {
      font-size: 22px; opacity: 0.9;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }
    .header .updated {
      position: absolute; right: 20px; bottom: 12px;
      font-size: 11px; opacity: 0.7;
    }

    /* ── Section ── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 10px;
      font-size: 13px; font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 2px;
      border-radius: 1px;
    }
    .section-label.private {
      color: var(--green);
    }
    .section-label.private::after { background: var(--grad-private); }
    .section-label.biz {
      color: var(--purple);
    }
    .section-label.biz::after { background: var(--grad-biz); }

    /* ── Cards ── */
    .cards { padding: 0 14px 8px; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border: none;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow-hover); }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .icon-health { background: linear-gradient(135deg, #10b981, #34d399); }
    .icon-task { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .icon-schedule { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
    .icon-feed { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
    .icon-biz { background: linear-gradient(135deg, #ec4899, #f472b6); }
    .icon-msg { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
    .icon-habit { background: linear-gradient(135deg, #94a3b8, #cbd5e1); }
    .icon-kpi { background: linear-gradient(135deg, #f59e0b, #ef4444); }

    /* ── Life KPI ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .kpi-item {
      text-align: center;
      padding: 10px 4px;
      border-radius: 12px;
    }
    .kpi-item .kpi-icon { font-size: 20px; margin-bottom: 4px; }
    .kpi-item .kpi-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
    .kpi-item.done { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 1px solid #bbf7d0; }
    .kpi-item.done .kpi-icon { filter: none; }
    .kpi-item.not-done { background: #f9fafb; border: 1px solid #e5e7eb; }
    .kpi-item.not-done .kpi-icon { opacity: 0.3; }

    /* ── Condition ── */
    .condition-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .condition-card {
      padding: 16px 14px;
      border-radius: 14px;
      text-align: center;
      position: relative;
    }
    .condition-card.body-data { background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; }
    .condition-card.body-feel { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 1px solid #fcd34d; }
    .condition-card .cond-value {
      font-size: 32px; font-weight: 800;
    }
    .condition-card.body-data .cond-value { color: #2563eb; }
    .condition-card.body-feel .cond-value { color: #d97706; }
    .condition-card .cond-label { font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px; }
    .condition-card .cond-sub {
      font-size: 10px; color: var(--text-muted);
      margin-top: 4px;
    }
    .cond-good { color: var(--green) !important; }
    .cond-warn { color: var(--orange) !important; }
    .cond-bad { color: var(--red) !important; }
    .cond-match { font-size: 11px; text-align: center; padding: 6px 0; color: var(--text-muted); font-weight: 600; }

    .action-guide {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.6;
      display: none;
    }
    .action-guide.good {
      display: block;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    .action-guide.caution {
      display: block;
      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border: 1px solid #fde68a;
      color: #92400e;
    }
    .action-guide.rest {
      display: block;
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border: 1px solid #fecaca;
      color: #991b1b;
    }

    /* ── Day Plan (MAX performance) ── */
    .day-mode {
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 10px;
      text-align: center;
    }
    .day-mode.green  { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 2px solid #10b981; }
    .day-mode.yellow { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 2px solid #f59e0b; }
    .day-mode.red    { background: linear-gradient(135deg, #fee2e2, #fecaca); border: 2px solid #ef4444; }
    .day-mode-badge { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .day-mode-reason { font-size: 12px; color: var(--text-muted); font-weight: 600; }

    .day-blocks {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    .day-block {
      display: flex;
      gap: 10px;
      padding: 9px 12px;
      background: #f8fafc;
      border-radius: 10px;
      border-left: 3px solid var(--blue);
      font-size: 12px;
      align-items: center;
    }
    .day-block.green  { border-left-color: var(--green); background: linear-gradient(90deg, #f0fdf4, #f8fafc); }
    .day-block.yellow { border-left-color: var(--orange); background: linear-gradient(90deg, #fffbeb, #f8fafc); }
    .day-block.red    { border-left-color: var(--red); background: linear-gradient(90deg, #fef2f2, #f8fafc); }
    .dbk-time {
      font-weight: 700;
      flex-shrink: 0;
      min-width: 56px;
    }
    .dbk-action {
      color: var(--text);
      line-height: 1.5;
    }

    /* Deep sleep progress bar */
    .deep-bar-wrap {
      margin-top: 8px;
      padding: 10px 12px;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      border-radius: 10px;
      border: 1px solid #c4b5fd;
    }
    .deep-bar-label {
      font-size: 11px;
      color: #6d28d9;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .deep-bar-track {
      height: 8px;
      background: #ede9fe;
      border-radius: 4px;
      overflow: hidden;
    }
    .deep-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #6d28d9);
      border-radius: 4px;
      transition: width 0.5s;
    }

    /* ── Health ── */
    .health-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .health-item {
      text-align: center;
      padding: 12px 6px;
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
      border-radius: 12px;
      border: 1px solid #d1fae5;
    }
    .health-item .value {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, #059669, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .health-item .label {
      font-size: 11px; color: var(--text-muted);
      margin-top: 3px; font-weight: 500;
    }
    .health-item .hint {
      font-size: 10px; color: #aaa;
      margin-top: 1px;
    }
    .health-targets {
      margin-top: 12px; padding: 10px 12px;
      background: linear-gradient(135deg, #f0f9ff, #eff6ff);
      border: 1px solid #bfdbfe; border-radius: 10px;
      font-size: 11px; line-height: 1.6;
    }
    .health-targets .ht-title {
      font-weight: 700; font-size: 12px; color: #1e40af; margin-bottom: 6px;
    }
    .health-targets .ht-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 2px 0;
    }
    .health-targets .ht-metric { font-weight: 600; color: #334155; }
    .health-targets .ht-current { color: #64748b; }
    .health-targets .ht-goal { color: #16a34a; font-weight: 700; }
    .health-targets .ht-tips {
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #bfdbfe;
      color: #475569;
    }
    .health-targets .ht-tips li { margin-bottom: 3px; }

    /* ── Tasks ── */
    .task-progress {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .task-progress-bar {
      flex: 1; height: 8px; border-radius: 4px;
      background: #f3f4f6; overflow: hidden;
    }
    .task-progress-fill {
      height: 100%; border-radius: 4px;
      background: var(--grad-private);
      transition: width 0.5s;
    }
    .task-progress-text { font-size: 13px; font-weight: 700; color: var(--green); min-width: 40px; }
    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid #f3f4f6;
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .task-check.done { background: var(--green); color: white; }
    .task-check.pending { background: #f3f4f6; color: #cbd5e1; border: 2px solid #e2e8f0; }
    .task-slot {
      font-size: 10px; padding: 2px 8px;
      border-radius: 6px; font-weight: 700;
    }
    .slot-morning { background: #fef3c7; color: #d97706; }
    .slot-daytime { background: #d1fae5; color: #059669; }
    .slot-evening { background: #dbeafe; color: #2563eb; }
    .task-label { font-weight: 500; }
    .task-label.done { text-decoration: line-through; color: var(--text-muted); }

    /* ── Schedule ── */
    .schedule-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--blue); flex-shrink: 0;
    }
    .schedule-time {
      font-size: 13px; font-weight: 700; color: var(--blue);
      min-width: 50px;
    }
    .schedule-label { font-size: 14px; font-weight: 500; }

    /* ── Feed ── */
    .feed-item {
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted); margin-bottom: 4px;
    }
    .feed-source {
      padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 10px;
    }
    .source-x { background: #dbeafe; color: #2563eb; }
    .source-release { background: #d1fae5; color: #059669; }
    .feed-title { font-size: 13px; line-height: 1.5; font-weight: 500; }
    .feed-title a { color: var(--text); text-decoration: none; }
    .feed-title a:hover { color: var(--purple); }
    .feed-engagement {
      font-weight: 700; font-size: 11px;
    }
    .engagement-high { color: var(--pink); }
    .engagement-mid { color: var(--orange); }
    .engagement-low { color: var(--text-muted); }

    /* ── Biz Metrics ── */
    .biz-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .biz-item {
      padding: 14px;
      border-radius: 12px;
      text-align: center;
    }
    .biz-item:nth-child(1) { background: linear-gradient(135deg, #fdf2f8, #fce7f3); border: 1px solid #fbcfe8; }
    .biz-item:nth-child(2) { background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; }
    .biz-item:nth-child(3) { background: linear-gradient(135deg, #f5f3ff, #ede9fe); border: 1px solid #ddd6fe; }
    .biz-item:nth-child(4) { background: linear-gradient(135deg, #fefce8, #fef9c3); border: 1px solid #fde68a; }
    .biz-item .value {
      font-size: 24px; font-weight: 800;
      color: var(--text);
    }
    .biz-item .label { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-weight: 600; }
    .biz-item.danger .value { color: var(--red); }

    /* ── Messages ── */
    .msg-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .msg-row:last-child { border-bottom: none; }
    .msg-label { font-size: 14px; font-weight: 600; }
    .msg-badge {
      font-size: 13px; font-weight: 800;
      padding: 4px 14px; border-radius: 20px;
    }
    .msg-badge.alert { background: #fef2f2; color: var(--red); }
    .msg-badge.ok { background: #f0fdf4; color: var(--green); }

    /* ── Cash ── */
    .cash-bar {
      height: 10px; border-radius: 5px;
      background: #f3f4f6;
      margin: 10px 0;
      overflow: hidden;
    }
    .cash-bar-fill {
      height: 100%; border-radius: 5px;
      transition: width 0.6s ease;
    }
    .cash-info {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-muted); font-weight: 600;
    }

    .btn-refresh {
      margin-left: auto; border: none; border-radius: 8px;
      padding: 4px 10px; font-size: 11px; font-weight: 700;
      cursor: pointer; color: white;
    }

    .empty-state {
      color: var(--text-muted); font-size: 13px;
      text-align: center; padding: 24px 0;
      font-weight: 500;
    }

    /* ── Refresh ── */
    .refresh-btn {
      position: fixed; bottom: 24px; right: 20px;
      width: 52px; height: 52px; border-radius: 16px;
      background: var(--grad-header);
      border: none; color: white;
      font-size: 22px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(246,211,101,0.4);
      z-index: 100;
      transition: transform 0.15s;
    }
    .refresh-btn:active { transform: scale(0.9) rotate(180deg); }

    /* ── Two columns ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 12px;
      padding: 0 14px;
    }
    .two-col .section-label { padding-left: 0; }
    .two-col .cards { padding: 0; }
    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 16px 0 8px;
      font-size: 13px; font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .col-header::after {
      content: ''; flex: 1; height: 2px; border-radius: 1px;
    }
    .col-header.private { color: var(--green); }
    .col-header.private::after { background: var(--grad-private); }
    .col-header.biz { color: var(--purple); }
    .col-header.biz::after { background: var(--grad-biz); }

    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
    }
    @media (min-width: 700px) {
      .top-cards, .two-col { max-width: 900px; margin: 0 auto; }
      .header { text-align: center; }
      .header .updated { position: static; margin-top: 6px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>しゅうしゅう Dashboard</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="updated" id="updatedDisplay"></div>
  </div>

  <!-- 2-week schedule (full width) -->
  <div class="top-cards" style="padding:14px 14px 0">
    <div class="card">
      <div class="card-title"><div class="card-icon icon-schedule">📅</div> スケジュール（直近2週間）<span id="sch2wRange" style="margin-left:auto;font-size:11px;color:var(--text-muted)"></span></div>
      <div id="schedule2w"><div class="empty-state">データ準備中</div></div>
    </div>
    <div class="card">
      <div class="card-title"><div class="card-icon icon-task">✅</div> タスク<span style="margin-left:auto;font-size:11px;color:var(--text-muted)">SoT: Google Tasks（チェックはGoogle ToDoアプリで）</span></div>
      <div id="taskView"><div class="empty-state">データ準備中</div></div>
    </div>
  </div>


  <button class="refresh-btn" onclick="loadAll()">↻</button>

  <script>
    // Vercel配信時もGitHub Pagesの最新データを読む（push毎の再デプロイ不要にするため）
    const BASE = location.hostname.endsWith('github.io') ? './data/' : 'https://shujiuyeda.github.io/web/data/';

    const now = new Date(Date.now() + 9 * 3600000);
    const days = ['日','月','火','水','木','金','土'];

    // nowは+9hシフト済みのためtoISOString(UTC表示)がJSTの時刻になる。ローカルgetterだとJST環境で二重シフトするのでISO文字列から組み立てる
    const [jy, jm, jd] = now.toISOString().slice(0, 10).split('-');
    document.getElementById('dateDisplay').textContent =
      `${jy}/${jm}/${jd}（${days[new Date(Date.UTC(+jy, +jm - 1, +jd)).getUTCDay()]}）`;

    async function fetchJSON(path) {
      try {
        const r = await fetch(BASE + path + '?t=' + Date.now());
        if (!r.ok) return null;
        return await r.json();
      } catch { return null; }
    }

    async function loadSchedule2w() {
      const data = await fetchJSON('schedule.json');
      const el = document.getElementById('schedule2w');
      if (!data || !data.days || !data.days.length) {
        el.innerHTML = '<div class="empty-state">データ準備中</div>';
        return;
      }
      if (data.range) document.getElementById('sch2wRange').textContent = `${data.range.from}〜${data.range.to}（毎日2:00自動更新）`;
      const jstNow = new Date(Date.now() + 9 * 3600 * 1000);
      const todayStr = jstNow.toISOString().slice(0, 10);
      let html = '<div style="display:flex;flex-direction:column">';
      data.days.forEach(d => {
        if (d.date < todayStr) return;
        const isToday = d.date === todayStr;
        const wd = (d.label.match(/（(.)）/) || [])[1] || '';
        const wkend = (wd === '土' || wd === '日');
        let right = '';
        if (d.items && d.items.length) {
          right = d.items.map(it =>
            `<span style="white-space:nowrap"><span style="color:var(--text-muted);font-variant-numeric:tabular-nums">${it.time}</span> ${it.icon} ${it.title}</span>`
          ).join('<span style="color:#d1d5db"> ｜ </span>');
        }
        if (d.soccer) right += (right ? '<span style="color:#d1d5db"> ｜ </span>' : '') + `<span style="color:#15803d;white-space:nowrap">${d.soccer}</span>`;
        if (!right) right = '<span style="color:#d1d5db">—</span>';
        html += `<div style="display:flex;gap:10px;padding:5px 8px;border-bottom:1px solid #f3f4f6;${isToday ? 'background:#FFF7ED;border-radius:8px;' : ''}">
          <div style="flex:0 0 100px;font-size:12px;font-weight:700;white-space:nowrap;color:${wkend ? '#dc2626' : 'var(--text)'}">${d.label}${isToday ? ' <span style="font-size:10px;color:var(--orange)">今日</span>' : ''}</div>
          <div style="flex:1;font-size:12px;line-height:1.7">${right}</div>
        </div>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }


    async function loadTaskView() {
      const data = await fetchJSON('tasks.json');
      const el = document.getElementById('taskView');
      if (!data || !data.lists || !data.lists.length) {
        el.innerHTML = '<div class="empty-state">データ準備中</div>';
        return;
      }
      const item = t => `<div style="display:flex;gap:7px;padding:3px 0;font-size:12px;line-height:1.6"><span style="color:#d1d5db">○</span><span>${t.title}</span></div>`;
      let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px">';
      data.lists.forEach(list => {
        html += `<div><div style="font-size:12px;font-weight:800;color:var(--purple);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">${list.name}</div>`;
        (list.groups || []).forEach(g => {
          html += `<div style="margin-bottom:8px"><div style="font-size:12.5px;font-weight:700;padding:4px 0;border-bottom:1px solid #f3f4f6">${g.title} <span style="color:var(--text-muted);font-weight:500;font-size:11px">${g.items.length}</span></div>`;
          g.items.forEach(t => { html += item(t); });
          html += '</div>';
        });
        (list.loose || []).forEach(t => { html += item(t); });
        html += '</div>';
      });
      html += '</div>';
      el.innerHTML = html;
    }

    async function loadAll() {
      document.getElementById('updatedDisplay').textContent = '更新中...';
      await Promise.all([loadSchedule2w(), loadTaskView()]);
      document.getElementById('updatedDisplay').textContent =
        '最終更新 ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
    }
    loadAll();
  </script>
</body>
</html>
