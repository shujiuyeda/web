<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhoneのパスワードアプリの使い方 基礎の基礎 — 講座台本</title>
<style>
  :root {
    --bg: #fafaf7;
    --text: #2c2c2c;
    --muted: #6b6b6b;
    --accent: #d97757;
    --accent-light: #fce8df;
    --border: #e5e5e0;
    --sidebar-bg: #ffffff;
    --section-bg: #f3f1eb;
    --code-bg: #f5f5f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 16px;
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  /* サイドバー */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .toc-section {
    margin: 16px 0 8px;
    padding: 0 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .toc-list {
    list-style: none;
  }
  .toc-list li {
    border-bottom: 1px solid transparent;
  }
  .toc-list a {
    display: block;
    padding: 8px 20px 8px 28px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    border-left: 3px solid transparent;
    transition: all 0.2s;
  }
  .toc-list a:hover {
    background: var(--accent-light);
    border-left-color: var(--accent);
    color: var(--accent);
  }
  /* メイン */
  .main {
    padding: 48px 64px 96px;
    max-width: 900px;
  }
  .hero {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--border);
  }
  .hero-label {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-size: 32px;
    line-height: 1.4;
    margin-bottom: 12px;
    color: var(--text);
  }
  .hero-meta {
    color: var(--muted);
    font-size: 14px;
  }
  /* セクション見出し */
  .section-header {
    background: var(--section-bg);
    padding: 24px 32px;
    margin: 48px -32px 32px;
    border-left: 6px solid var(--accent);
    border-radius: 0 8px 8px 0;
  }
  .section-header .label {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .section-header h2 {
    font-size: 24px;
    color: var(--text);
  }
  /* レッスン */
  .lesson {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 24px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .lesson:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .lesson-header {
    background: linear-gradient(135deg, #fcefe7 0%, #fce8df 100%);
    padding: 20px 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .lesson-number {
    background: var(--accent);
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .lesson-title {
    flex: 1;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .lesson-toggle {
    color: var(--accent);
    font-size: 20px;
    transition: transform 0.2s;
  }
  .lesson.open .lesson-toggle {
    transform: rotate(180deg);
  }
  .lesson-body {
    padding: 28px;
    display: none;
  }
  .lesson.open .lesson-body {
    display: block;
  }
  /* レッスン内のサブセクション */
  .lesson-body h3 {
    font-size: 17px;
    margin: 24px 0 12px;
    color: var(--accent);
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--border);
  }
  .lesson-body h3:first-child {
    margin-top: 0;
  }
  .lesson-body p {
    margin-bottom: 14px;
  }
  .lesson-body ul, .lesson-body ol {
    margin: 12px 0 18px 24px;
  }
  .lesson-body li {
    margin-bottom: 6px;
  }
  .lesson-body strong {
    color: var(--accent);
    font-weight: 600;
  }
  /* コントロール */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .btn {
    background: white;
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: all 0.2s;
  }
  .btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn.primary:hover {
    background: #c2664a;
    color: white;
  }
  /* モバイル */
  .menu-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .sidebar {
      position: fixed;
      left: -300px;
      top: 0;
      width: 280px;
      transition: left 0.3s;
      z-index: 99;
      box-shadow: 4px 0 16px rgba(0,0,0,0.1);
    }
    .sidebar.open {
      left: 0;
    }
    .menu-toggle {
      display: block;
    }
    .main {
      padding: 64px 20px 64px;
    }
    .section-header {
      margin: 32px -8px 24px;
      padding: 18px 20px;
    }
    .hero h1 {
      font-size: 24px;
    }
  }
  /* ローディング */
  .loading {
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
  }
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰ 目次</button>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">📘 講座目次</div>
    <nav id="toc"></nav>
  </aside>

  <main class="main">
    <div class="hero">
      <div class="hero-label">オンライン講座 台本</div>
      <h1>iPhoneのパスワードアプリの使い方<br>基礎の基礎</h1>
      <p class="hero-meta">全26レッスン / 8セクション / 40〜60代ビジネスパーソン向け入門講座</p>
    </div>

    <div class="controls">
      <button class="btn primary" onclick="toggleAll(true)">📖 全レッスン展開</button>
      <button class="btn" onclick="toggleAll(false)">📕 全レッスン折りたたみ</button>
      <button class="btn" onclick="window.print()">🖨️ 印刷</button>
    </div>

    <div id="content"><div class="loading">台本を読み込み中…</div></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/marked.min.js"></script>
<script>
(async function() {
  const url = './data/password-course-script.md?v=' + Date.now();
  let md;
  try {
    const res = await fetch(url);
    md = await res.text();
  } catch (e) {
    document.getElementById('content').innerHTML = '<p style="color:red">台本データの読み込みに失敗しました</p>';
    return;
  }

  // Markdownをセクション・レッスンに分割
  const lines = md.split('\n');
  const sections = [];
  let currentSection = null;
  let currentLesson = null;
  let currentBuffer = [];

  function flushLesson() {
    if (currentLesson && currentSection) {
      currentLesson.body = currentBuffer.join('\n').trim();
      currentSection.lessons.push(currentLesson);
      currentLesson = null;
      currentBuffer = [];
    }
  }

  function flushSection() {
    flushLesson();
    if (currentSection) {
      sections.push(currentSection);
      currentSection = null;
    }
  }

  let preamble = [];
  let inPreamble = true;

  for (const line of lines) {
    const h1 = line.match(/^# (.+)$/);
    const h2 = line.match(/^## (.+)$/);

    if (h1) {
      // セクション開始（# で始まる）
      if (inPreamble) {
        // 最初の "# タイトル" は preamble の一部
        preamble.push(line);
        continue;
      }
      flushSection();
      currentSection = { title: h1[1], lessons: [] };
      continue;
    }

    if (h2) {
      const lessonMatch = h2[1].match(/^レッスン(\d+):\s*(.+)$/);
      if (lessonMatch) {
        inPreamble = false;
        if (!currentSection) {
          currentSection = { title: '導入', lessons: [] };
        }
        flushLesson();
        currentLesson = { number: lessonMatch[1], title: lessonMatch[2], body: '' };
        continue;
      } else {
        // レッスン以外のH2（ステップ1: ターゲット分析など）はpreambleに含める
        if (inPreamble) {
          preamble.push(line);
          continue;
        }
      }
    }

    if (currentLesson) {
      currentBuffer.push(line);
    } else if (inPreamble) {
      preamble.push(line);
    }
  }
  flushSection();

  // 描画
  const container = document.getElementById('content');
  const toc = document.getElementById('toc');
  container.innerHTML = '';
  toc.innerHTML = '';

  // preambleを描画
  if (preamble.length > 0) {
    const preDiv = document.createElement('div');
    preDiv.className = 'lesson-body';
    preDiv.style.background = 'white';
    preDiv.style.border = '1px solid var(--border)';
    preDiv.style.borderRadius = '8px';
    preDiv.style.marginBottom = '32px';
    preDiv.innerHTML = marked.parse(preamble.join('\n'));
    container.appendChild(preDiv);
  }

  // 各セクションを描画
  sections.forEach((sec, sIdx) => {
    if (sec.lessons.length === 0) return;

    const sectionId = 'sec-' + sIdx;
    const header = document.createElement('div');
    header.className = 'section-header';
    header.id = sectionId;
    const label = sec.title.match(/^(セクション\d+)/);
    header.innerHTML = `
      ${label ? `<div class="label">${label[1]}</div>` : ''}
      <h2>${sec.title.replace(/^セクション\d+:\s*/, '')}</h2>
    `;
    container.appendChild(header);

    // 目次にセクション
    const tocSecTitle = document.createElement('div');
    tocSecTitle.className = 'toc-section';
    tocSecTitle.textContent = sec.title;
    toc.appendChild(tocSecTitle);
    const tocList = document.createElement('ul');
    tocList.className = 'toc-list';

    sec.lessons.forEach((lesson) => {
      const lessonId = 'lesson-' + lesson.number;
      const lessonDiv = document.createElement('div');
      lessonDiv.className = 'lesson';
      lessonDiv.id = lessonId;
      lessonDiv.innerHTML = `
        <div class="lesson-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="lesson-number">${lesson.number}</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-toggle">▼</div>
        </div>
        <div class="lesson-body">${marked.parse(lesson.body)}</div>
      `;
      container.appendChild(lessonDiv);

      // 目次にレッスン
      const li = document.createElement('li');
      li.innerHTML = `<a href="#${lessonId}" onclick="openLesson('${lessonId}')">${lesson.number}. ${lesson.title}</a>`;
      tocList.appendChild(li);
    });
    toc.appendChild(tocList);
  });

  // 最初のレッスンを展開
  const first = document.querySelector('.lesson');
  if (first) first.classList.add('open');
})();

function openLesson(id) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('open');
    // モバイルの場合はサイドバー閉じる
    if (window.innerWidth <= 900) {
      document.querySelector('.sidebar').classList.remove('open');
    }
  }
}

function toggleAll(open) {
  document.querySelectorAll('.lesson').forEach(l => {
    if (open) l.classList.add('open');
    else l.classList.remove('open');
  });
}
</script>
</body>
</html>
